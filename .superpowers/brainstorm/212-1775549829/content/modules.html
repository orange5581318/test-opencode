<h2>商城后台管理系统 — 功能模块范围</h2>
<p class="subtitle">你希望这个系统包含哪些核心模块？（可多选）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="dashboard" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>数据看板 Dashboard</h3>
      <p>销售统计、订单趋势、用户增长等核心指标可视化</p>
    </div>
  </div>
  <div class="option" data-choice="product" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>商品管理</h3>
      <p>商品列表、分类管理、SKU/规格、上下架、图片上传</p>
    </div>
  </div>
  <div class="option" data-choice="order" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>订单管理</h3>
      <p>订单列表、状态流转（待付款→已发货→已完成）、退款处理</p>
    </div>
  </div>
  <div class="option" data-choice="user" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>用户管理 + 权限控制</h3>
      <p>用户列表、角色管理、菜单权限、按钮级权限（RBAC）</p>
    </div>
  </div>
</div>
